<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PDF Snip — drag to copy an area as an image</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{
    --bg: #14110f;
    --panel: #1d1815;
    --panel-raised: #26201b;
    --line: #3a2f27;
    --text: #efe8df;
    --text-dim: #a8998a;
    --crop: #e0562d;      /* selection accent, darkroom safelight */
    --brass: #cfa76b;     /* action accent */
    --brass-dim: #4a3b26;
    --ok: #7fb08a;
    --mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ margin:0; padding:0; background:var(--bg); color:var(--text); font-family:var(--sans); height:100%; overflow:hidden; }
  .app{ display:flex; flex-direction:column; height:100%; }

  header{
    padding: 12px 16px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, var(--panel), var(--bg));
    flex-shrink:0;
  }
  h1{ font-size:15px; margin:0; font-weight:650; letter-spacing:.2px; white-space:nowrap; }
  button.btn{
    background:var(--brass-dim); border:1px solid var(--brass); color:var(--brass);
    padding:8px 13px; border-radius:6px; font-size:12.5px; font-weight:600; cursor:pointer;
    font-family:var(--sans); white-space:nowrap; flex-shrink:0;
  }
  button.btn:focus-visible{ outline:2px solid var(--brass); outline-offset:1px; }
  .status{ font-family:var(--mono); font-size:11.5px; color:var(--text-dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .status.err{ color:#e0562d; }

  .viewer{
    flex:1; min-height:0; overflow-y:auto; overflow-x:hidden;
    background:#0a0908;
    padding:20px 14px 40px;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-y: contain;
  }

  .empty{
    height:100%; display:flex; align-items:center; justify-content:center; text-align:center;
    color:var(--text-dim); font-size:13px; line-height:1.7; padding:20px;
  }
  .empty b{ color:var(--crop); }

  .pages{ max-width:900px; margin:0 auto; }
  .page{
    position:relative; margin:0 auto 22px; background:#fff; border-radius:5px;
    box-shadow:0 8px 26px rgba(0,0,0,.5); overflow:hidden; touch-action:pinch-zoom;
  }
  .page canvas{
    display:block; width:100%; height:100%;
    -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;
  }
  .page.loading{ background:linear-gradient(90deg, #f4f1ec, #ffffff, #f4f1ec); }

  .selection-box{
    position:absolute; border:1.5px dashed var(--crop);
    background: rgba(224,86,45,0.14); pointer-events:none;
  }
  @media (prefers-reduced-motion: no-preference){
    .selection-box{ animation: march .6s linear infinite; }
  }
  @keyframes march{ to{ background-position: 8px 0; } }

  .snip{
    position:absolute; border-radius:4px; overflow:hidden;
    border:1px solid var(--brass); box-shadow:0 6px 20px rgba(0,0,0,.5);
  }
  .snip img{ display:block; width:100%; height:100%; -webkit-touch-callout:default; -webkit-user-select:auto; user-select:auto; }
  .snip .close{
    position:absolute; top:-9px; right:-9px; width:20px; height:20px; border-radius:50%;
    background:var(--crop); color:#1b0b06; border:none; font-size:13px; line-height:20px;
    text-align:center; cursor:pointer; padding:0; box-shadow:0 2px 6px rgba(0,0,0,.4);
  }
  .snip .badge{
    position:absolute; bottom:4px; right:4px; font-size:9.5px; font-family:var(--mono);
    background:rgba(0,0,0,.6); color:var(--ok); padding:2px 6px; border-radius:4px; white-space:nowrap;
  }
  .snip .badge.err{ color:#ffb99e; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>PDF Snip</h1>
    <button class="btn" id="fileBtn">Choose a PDF</button>
    <input type="file" id="fileInput" accept="application/pdf" style="display:none;">
    <span class="status" id="statusMsg">Drag anywhere on a page to copy that area as an image.</span>
  </header>

  <div class="viewer" id="viewer">
    <div class="empty" id="emptyState">Choose a PDF above.<br><br>Once it loads, <b>drag</b> on any page to copy that area — pinch to zoom in for detail.</div>
    <div class="pages" id="pages" style="display:none;"></div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const el = {
  fileBtn: document.getElementById('fileBtn'),
  fileInput: document.getElementById('fileInput'),
  statusMsg: document.getElementById('statusMsg'),
  viewer: document.getElementById('viewer'),
  emptyState: document.getElementById('emptyState'),
  pages: document.getElementById('pages'),
};

const RENDER_MULTIPLIER = 3; // internal bitmap resolution headroom for crisp pinch-zoom & crop
const MIN_DRAG = 6; // px, ignore accidental taps

let pdfDoc = null;
let pageMetas = [];      // { num, wrapper, canvas, viewportBase, rendered }
let observer = null;
let dragging = false;
let dragStart = null;    // {x,y} in canvas CSS px
let dragMeta = null;     // the pageMeta being dragged on
let activeBox = null;    // current selection-box element

function setStatus(msg, kind){
  el.statusMsg.textContent = msg || '';
  el.statusMsg.className = 'status' + (kind ? ' ' + kind : '');
}

el.fileBtn.addEventListener('click', () => el.fileInput.click());

el.fileInput.addEventListener('change', async () => {
  const file = el.fileInput.files && el.fileInput.files[0];
  if(!file) return;
  try{
    const buffer = await file.arrayBuffer();
    await loadPdf(buffer, file.name);
  }catch(err){
    console.error(err);
    setStatus('Could not read that file — try again.', 'err');
  }finally{
    el.fileInput.value = ''; // allow re-choosing the same file
  }
});

async function loadPdf(data, filename){
  setStatus(`Loading ${filename}…`);
  if(observer) observer.disconnect();
  el.pages.innerHTML = '';
  pageMetas = [];

  try{
    pdfDoc = await pdfjsLib.getDocument({ data }).promise;

    const pageObjs = await Promise.all(
      Array.from({ length: pdfDoc.numPages }, (_, i) => pdfDoc.getPage(i + 1))
    );

    const availWidth = Math.max(200, el.pages.clientWidth || el.viewer.clientWidth - 28);

    pageObjs.forEach((page, i) => {
      const viewportBase = page.getViewport({ scale: 1 });
      const displayW = Math.min(availWidth, viewportBase.width);
      const displayH = displayW * (viewportBase.height / viewportBase.width);

      const wrapper = document.createElement('div');
      wrapper.className = 'page loading';
      wrapper.style.width = displayW + 'px';
      wrapper.style.height = displayH + 'px';
      el.pages.appendChild(wrapper);

      pageMetas.push({ num: i + 1, page, wrapper, canvas: null, viewportBase, rendered: false });
    });

    el.emptyState.style.display = 'none';
    el.pages.style.display = '';

    observer = new IntersectionObserver(onIntersect, { root: el.viewer, rootMargin: '800px 0px' });
    pageMetas.forEach(meta => observer.observe(meta.wrapper));

    setStatus(`${filename} — ${pdfDoc.numPages} page${pdfDoc.numPages === 1 ? '' : 's'}`, 'ok');
  }catch(err){
    console.error(err);
    setStatus('Could not load that PDF — it may be corrupted or password-protected.', 'err');
    el.emptyState.style.display = '';
    el.pages.style.display = 'none';
  }
}

function onIntersect(entries){
  for(const entry of entries){
    if(!entry.isIntersecting) continue;
    const meta = pageMetas.find(m => m.wrapper === entry.target);
    if(!meta || meta.rendered) continue;
    renderPage(meta);
    observer.unobserve(entry.target);
  }
}

async function renderPage(meta){
  const displayW = meta.wrapper.clientWidth;
  const displayH = meta.wrapper.clientHeight;
  const scale = (displayW / meta.viewportBase.width) * RENDER_MULTIPLIER;
  const renderViewport = meta.page.getViewport({ scale });

  const canvas = document.createElement('canvas');
  canvas.width = Math.round(renderViewport.width);
  canvas.height = Math.round(renderViewport.height);
  canvas.style.width = '100%';
  canvas.style.height = '100%';

  const ctx = canvas.getContext('2d');
  await meta.page.render({ canvasContext: ctx, viewport: renderViewport }).promise;

  meta.wrapper.classList.remove('loading');
  meta.wrapper.appendChild(canvas);
  meta.canvas = canvas;
  meta.rendered = true;
}

// --- Always-on drag-to-select, delegated across all rendered page canvases ---

el.pages.addEventListener('contextmenu', e => e.preventDefault());

el.pages.addEventListener('pointerdown', (e) => {
  const canvas = e.target.closest('.page canvas');
  if(!canvas) return;
  const meta = pageMetas.find(m => m.canvas === canvas);
  if(!meta) return;

  dragging = true;
  dragMeta = meta;
  canvas.setPointerCapture(e.pointerId);
  const rect = canvas.getBoundingClientRect();
  dragStart = { x: e.clientX - rect.left, y: e.clientY - rect.top };

  activeBox = document.createElement('div');
  activeBox.className = 'selection-box';
  meta.wrapper.appendChild(activeBox);
  positionBox(activeBox, dragStart.x, dragStart.y, 0, 0);
});

el.pages.addEventListener('pointermove', (e) => {
  if(!dragging || !dragMeta) return;
  const rect = dragMeta.canvas.getBoundingClientRect();
  const curX = clamp(e.clientX - rect.left, 0, rect.width);
  const curY = clamp(e.clientY - rect.top, 0, rect.height);
  const x = Math.min(dragStart.x, curX);
  const y = Math.min(dragStart.y, curY);
  const w = Math.abs(curX - dragStart.x);
  const h = Math.abs(curY - dragStart.y);
  positionBox(activeBox, x, y, w, h);
});

el.pages.addEventListener('pointerup', (e) => {
  if(!dragging || !dragMeta) return;
  finishDrag(e);
});

el.pages.addEventListener('pointercancel', () => {
  if(activeBox) activeBox.remove();
  dragging = false; dragMeta = null; activeBox = null;
});

function finishDrag(e){
  const meta = dragMeta;
  const rect = meta.canvas.getBoundingClientRect();
  const curX = clamp(e.clientX - rect.left, 0, rect.width);
  const curY = clamp(e.clientY - rect.top, 0, rect.height);
  const x = Math.min(dragStart.x, curX);
  const y = Math.min(dragStart.y, curY);
  const w = Math.abs(curX - dragStart.x);
  const h = Math.abs(curY - dragStart.y);

  dragging = false;
  dragMeta = null;
  if(activeBox){ activeBox.remove(); activeBox = null; }

  if(w < MIN_DRAG || h < MIN_DRAG) return; // accidental tap

  captureSelection(meta, x, y, w, h);
}

function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }

function positionBox(box, x, y, w, h){
  box.style.left = x + 'px';
  box.style.top = y + 'px';
  box.style.width = w + 'px';
  box.style.height = h + 'px';
}

function captureSelection(meta, cssX, cssY, cssW, cssH){
  const canvas = meta.canvas;
  const scaleX = canvas.width / canvas.clientWidth;
  const scaleY = canvas.height / canvas.clientHeight;
  const sx = Math.round(cssX * scaleX);
  const sy = Math.round(cssY * scaleY);
  const sw = Math.round(cssW * scaleX);
  const sh = Math.round(cssH * scaleY);

  const cropCanvas = document.createElement('canvas');
  cropCanvas.width = sw;
  cropCanvas.height = sh;
  cropCanvas.getContext('2d').drawImage(canvas, sx, sy, sw, sh, 0, 0, sw, sh);

  cropCanvas.toBlob(async (blob) => {
    if(!blob){ setStatus('Could not capture that selection — try again.', 'err'); return; }
    const badge = addFloatingSnip(meta, cssX, cssY, cssW, cssH, blob);

    try{
      await navigator.clipboard.write([ new ClipboardItem({ 'image/png': blob }) ]);
      setStatus('Copied to clipboard.', 'ok');
    }catch(err){
      console.error(err);
      setStatus('Auto-copy blocked by browser — long-press the image to copy.', 'err');
      badge.textContent = 'long-press to copy';
      badge.classList.add('err');
    }
  }, 'image/png');
}

function addFloatingSnip(meta, x, y, w, h, blob){
  const url = URL.createObjectURL(blob);

  const snip = document.createElement('div');
  snip.className = 'snip';
  positionBox(snip, x, y, w, h);

  const img = document.createElement('img');
  img.src = url;
  img.alt = 'Copied selection';
  snip.appendChild(img);

  const closeBtn = document.createElement('button');
  closeBtn.className = 'close';
  closeBtn.textContent = '\u00d7';
  closeBtn.setAttribute('aria-label', 'Dismiss');
  closeBtn.addEventListener('click', () => {
    URL.revokeObjectURL(url);
    snip.remove();
  });
  snip.appendChild(closeBtn);

  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = 'copied';
  snip.appendChild(badge);

  meta.wrapper.appendChild(snip);
  return badge;
}

// Reflow page sizing on resize (re-style only; rendered bitmaps keep their resolution headroom)
let resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if(!pdfDoc) return;
    const availWidth = Math.max(200, el.pages.clientWidth || el.viewer.clientWidth - 28);
    pageMetas.forEach(meta => {
      const displayW = Math.min(availWidth, meta.viewportBase.width);
      const displayH = displayW * (meta.viewportBase.height / meta.viewportBase.width);
      meta.wrapper.style.width = displayW + 'px';
      meta.wrapper.style.height = displayH + 'px';
    });
  }, 150);
});
</script>
</body>
</html>
